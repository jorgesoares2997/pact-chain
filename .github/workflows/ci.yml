name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    name: Smart Contract (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81.0"
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: cargo-${{ hashFiles('contract/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build (WASM)
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        run: cargo test

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://pact-chain.onrender.com
          NEXT_PUBLIC_STELLAR_RPC_URL: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_CONTRACT_WASM_HASH: 659d3762eb592800b267353f0f040730df1781c5b6525a9b8f6259d216120ee0
          NEXT_PUBLIC_USDC_TOKEN_ID: CBIELTK6YBZJU5UP2WWQEUCYKLPU6AUNZ2BQ4WWFEIE3USCIHMXQDAMA
          NEXT_PUBLIC_TREASURY_ADDRESS: GCBFL3SRDTPIDWG3HPPT7IQ3QIMEVJETYEGXBC444DM6KW2N5PBLLC2V
        run: npm run build
