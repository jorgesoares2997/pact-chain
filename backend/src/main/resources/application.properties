spring.application.name=pactchain-backend
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties]
# Datasource — driver is auto-detected from the JDBC URL (no explicit driver-class-name)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/pactchain;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USER:pactchain}
spring.datasource.password=${DB_PASS:pactchain}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Liquibase — explicitly bound so it uses the same datasource
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=${DATABASE_URL:jdbc:h2:file:./data/pactchain;AUTO_SERVER=TRUE}
spring.liquibase.user=${DB_USER:pactchain}
spring.liquibase.password=${DB_PASS:pactchain}

# H2 console disabled
spring.h2.console.enabled=false

# Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=1.0

# CORS
pactchain.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}
