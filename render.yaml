services:
  - type: web
    name: pactchain-backend
    runtime: java
    rootDir: backend
    buildCommand: ./mvnw package -DskipTests -q
    startCommand: java -jar target/*.jar
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://pact-chain.vercel.app
      - key: SENTRY_DSN
        value: ""
