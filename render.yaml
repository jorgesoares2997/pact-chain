services:
  - type: web
    name: pactchain-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://pact-chain.vercel.app
      - key: SENTRY_DSN
        value: ""
